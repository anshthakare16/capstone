<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Team Registration</h1>
    
    <form id="registrationForm">
        <!-- Class selection dropdown -->
        <label for="classSelect">Select Class:</label>
        <select id="classSelect" name="classSelect">
            <option value="AIDS">AIDS</option>
            <option value="CSA_A">CSA A</option>
            <option value="CSE_B">CSE B</option>
        </select>
        
        <!-- Student selection dropdowns -->
        <label for="member1">Member 1:</label>
        <select name="member1"></select>
        
        <label for="member2">Member 2:</label>
        <select name="member2"></select>
        
        <label for="member3">Member 3:</label>
        <select name="member3"></select>
        
        <label for="member4">Member 4:</label>
        <select name="member4"></select>
        
        <!-- Mentor selection dropdowns -->
        <label for="mentor1">Mentor 1:</label>
        <select name="mentor1"></select>
        
        <label for="mentor2">Mentor 2:</label>
        <select name="mentor2"></select>
        
        <label for="mentor3">Mentor 3:</label>
        <select name="mentor3"></select>
        
        <label for="mentor4">Mentor 4:</label>
        <select name="mentor4"></select>

        <button type="submit">Submit Your Ideas</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
